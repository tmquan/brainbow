# =====================================================================
# Boundary-head Configuration
# =====================================================================
# Inheritance chain:  default <- snemi3d <- combine <- boundary
#
# Trains CosmosTransfer3D with the 16-channel Boundary head active on
# the combined SNEMI3D + neurons + MICrONS dataset (see ``combine.yaml``).
# (Formerly named ``brainbow.yaml``.  The head was renamed from
# ``brainbow`` to ``boundary`` because the 6 face-affinity channels
# carry the instance-boundary supervision signal.)
#
# The target map is built on-the-fly from the label volume + raw image:
#   - 1 channel       := raw image intensity
#   - 3 RGB channels  := normalised min  (bbox-min (z, y, x)) / (D, H, W)
#   - 3 RGB channels  := normalised avg  (centroid) / (D, H, W)
#   - 3 RGB channels  := normalised max  (bbox-max (z, y, x)) / (D, H, W)
#   - 6 aff  channels := binary face-affinity to 6 neighbours in Z-Y-X
#                         order (T,B,U,D,L,R) with SAME-pad (boundary
#                         voxels self-connected).
#
# Usage::
#
#   python scripts/train.py --config-name boundary
#   python scripts/train.py --config-name boundary data.batch_size=2
#
# Resuming a crashed run.  Lightning writes the timestamped resume
# checkpoint as ``<output_dir>/<run_dir>/checkpoints/last.ckpt`` (the
# exact ``run_dir`` is printed at the top of every run's log).  Pass
# that path verbatim::
#
#   python scripts/train.py --config-name boundary \
#     training.resume_from_checkpoint=<output_dir>/<run_dir>/checkpoints/last.ckpt
# =====================================================================

defaults:
  - combine

experiment_name: boundary
project_name: brainbow

# Loss schema is the same as in default.yaml / snemi3d.yaml: each head
# is a mapping with a ``weight`` plus sub-loss kwargs.  Setting the
# top-level ``weight_<head>`` to a scalar (as we do for the disabled
# heads here) is shorthand for ``{weight: <scalar>}``.
loss:
  weight_semantic: 0.0            # disable: the boundary head colours instances
  weight_instance: 0.0            # disable: ditto
  weight_geometry: 0.0            # disable: ditto

  weight_boundary:
    weight: 1.0
    loss_loc: smooth_l1           # regression for the 9 location channels
    loss_raw: l1                  # regression for the raw channel
    weight_min: 1.0
    weight_avg: 1.0
    weight_max: 1.0
    weight_raw: 1.0
    weight_aff: 1.0               # legacy aggregate weight on the 6 aff channels
    foreground_only_loc: true     # location loss on FG voxels only
    aff_eps: 1.0e-5               # MONAI DiceLoss smoothing
