# =====================================================================
# Brainbow -- root config (`default`)
# =====================================================================
# Inheritance chain
# -----------------
#   default        <-- you are here
#     └── snemi3d  (CosmosTransfer3D + SNEMI3D / neurons / MICrONS)
#           └── combine   (drops AC4 from train, keeps it in val)
#
# Every concrete recipe inherits from this file via ``defaults: [- default]``
# (or transitively through ``snemi3d`` / ``combine``).  Keys here are the
# safe, dataset-agnostic defaults; per-recipe tuning lives in the child.
#
# To see the exact merged tree for any recipe::
#
#   python scripts/show_config.py --config-name <recipe>
# =====================================================================

# Experiment metadata
experiment_name: brainbow
project_name: brainbow
seed: 42

# Logging configuration
logger: tensorboard  # Options: tensorboard, wandb

# Optional: weights-only warm start (loaded *before* trainer.fit).
# Pass via the CLI (e.g. ``+ckpt_path=outputs/<run>/checkpoints/last.ckpt``)
# or set here directly.  Mutually exclusive with
# ``training.resume_from_checkpoint`` (full-state Lightning resume).
#
# Companion filters (only meaningful when ``ckpt_path`` is set):
# * ``ckpt_path_skip_prefixes`` drops any saved key starting with one of
#   the listed prefixes -- use when the live model has submodules that
#   should keep their fresh init (e.g. pretrained HF DiT, a newly-added
#   ControlNet branch).
#     +ckpt_path_skip_prefixes='[model.dit.,model.controlnet.]'
# * ``ckpt_path_only_prefixes`` is the inverse allowlist: keep *only*
#   keys matching one of the listed prefixes.
#     +ckpt_path_only_prefixes='[model.feature_projector.,model.decoder_adapter.]'
# The two filters are mutually exclusive.
ckpt_path: null
ckpt_path_skip_prefixes: null
ckpt_path_only_prefixes: null

# Data configuration
data:
  dataset: snemi3d  # Options: snemi3d, microns, neurons
  data_root: data
  batch_size: 4
  num_workers: 16
  cache_rate: 0.5
  pin_memory: true
  image_size: null
  slice_mode: true
  num_samples: null
  find_boundaries: 0.0
  # Normalisation mode for the per-instance distance-to-skeleton field
  # (``label_radius``).  ``true`` (default) divides each instance's
  # radii by its own max so the target lives in [0, 1] per-instance;
  # ``false`` leaves the value in voxel units.  Only consumed when the
  # geometry pipeline is active (``compute_geometry=true``) and the
  # ``weight_rad`` head is non-zero.
  radius_normalize: true
  elastic_prob: 0.0            # probability of 3-D elastic deformation (0 = off)
  elastic_sigma_range: [35, 50]       # Gaussian smoothing σ — high = sparse, smooth warp
  elastic_magnitude_range: [10, 40]   # displacement magnitude range (kept low for gentle warps)
  resolution_zoom_prob: 0.0   # probability of random resolution zoom (0 = off)
  resolution_zoom_range: null # per-axis [[z_min,z_max],[y_min,y_max],[x_min,x_max]] in nm; null = [30,40],[6,8],[6,8]
  resolution_map: null  # prefix→[Z,Y,X] nm for per-volume native resolution; null = use pixel_size for all
  # Keep false on multi-GPU jobs if host RAM is tight (each rank × num_workers processes).
  persistent_workers: true
  train_volumes: null  # List of {vol, seg} dicts; null = dataset defaults
  val_volumes: null    # Defaults to train_volumes
  test_volumes: null   # Defaults to train_volumes

# Model configuration
model:
  type: cosmostransfer3d  # Options: cosmostransfer3d, cosmospredict3d, vista3d
  in_channels: 1
  # Unified head: raw(1)+sem(1)+skl(1)+dir(3)+cov(6)+rad(1)+avg(3)+emb(16)
  # Sigmoid is applied to the contiguous (sem, skl) block at ch [1, 3);
  # all other channels stay linear.
  head_channels: 32
  feature_size: 64
  dropout: 0.2
  # If true, the wrapper will auto-pull pretrained weights from HuggingFace
  # on first instantiation:
  #   cosmostransfer3d -> nvidia/Cosmos-Transfer2.5-2B
  #   cosmospredict3d  -> nvidia/Cosmos-Predict2.5-2B
  #   vista3d          -> MONAI/VISTA3D-HF
  # Downloads are cached under ~/.cache/brainbow/.  Set to false to
  # train from scratch.
  pretrained: true

# Optimizer configuration
# Algorithm is hard-coded to AdamW in `BaseCosmosModule.configure_optimizers` /
# `BaseVistaModule.configure_optimizers`; this block tunes its hyperparameters
# and the LR scheduler wrapper (`_maybe_wrap_scheduler` in modules/base.py).
optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler:
    type: cosine
    T_max: 100
    eta_min: 1.0e-6

# Loss configuration -- nested per-head schema.
#
# Each ``weight_<head>`` is either a scalar (head's overall weight; all
# sub-loss kwargs default) OR a mapping ``{weight: ..., <kwarg>: ...}``
# whose entries are forwarded to the head's sub-loss constructor.  A
# nested mapping without ``weight:`` defaults to ``weight: 1.0``; set
# ``weight: 0`` (scalar or nested) to disable a head entirely.
loss:
  ignore_index: -100              # semantic label voxels masked out of sem Dice
  background: -1                  # aff target background mask; -1 = keep every voxel

  weight_raw:
    weight: 1.0
    loss: l1
  # Sigmoid + Dice on the binary foreground head (ch 1).  Dice-only
  # since May 2026; ``weight`` is the sole sub-knob.
  weight_sem:
    weight: 1.0
  # Sigmoid + Dice on the 1-voxel-wide skeleton mask (ch 2).  Dice
  # handles the ~99.9% negative imbalance natively (the BCE branch
  # this head used to carry was removed -- see ``GOTCHAS.md`` entry
  # on the May-2026 CE/BCE removal).
  weight_skl:
    weight: 0.0
  weight_dir:
    weight: 0.0
    loss: l1
  weight_cov:
    weight: 0.0
    loss: l1
  # Distance to nearest same-instance skeleton voxel (head ch 12, L1
  # foreground-only).  When precomputed by ``SkeletonGeometryd`` with
  # ``radius_normalize=True`` (default), the target lives in [0, 1]
  # per-instance; with ``radius_normalize=false`` it lives in voxel
  # units.
  weight_rad:
    weight: 0.0
    loss: l1
  weight_avg:
    weight: 0.0
    loss: l1
  weight_emb:
    weight: 1.0
    weight_pull: 1.0
    weight_push: 1.0
    weight_norm: 0.001
    delta_v: 0.5
    delta_d: 1.5
    normalize_embeddings: false
    max_hard_pairs: 0
  # Derived 12-channel face-affinity Dice heads.  ``tau`` controls the
  # softness of the ``exp(-tau * L1)`` kernel that turns the
  # continuous emb / avg field into a soft affinity score.
  weight_aff_emb:
    weight: 0.0
    tau: 1.0
  weight_aff_avg:
    weight: 0.0
    tau: 1.0

# Training configuration
training:
  # Validation-time clusterer.  `bandwidth` defaults to loss.delta_v,
  # `normalize_embeddings` defaults to loss.normalize_embeddings.
  # Names: soft_meanshift | hdbscan | meanshift | spatial_cc
  #
  #   - soft_meanshift : differentiable mean-shift (historical default).
  #                      Over-segments on random / untrained embeddings.
  #   - hdbscan        : density-based, auto-K.  Subsamples to
  #                      max_points.  GPU via cuML.  Ignores spatial
  #                      connectivity.
  #   - meanshift      : classical MeanShift.  GPU only if cuML < 23.x.
  #   - spatial_cc     : connected components on the per-voxel
  #                      embedding-affinity graph (see clusterer.py).
  #                      Respects spatial connectivity, linear time,
  #                      one threshold.  GPU via cupyx.scipy.sparse.
  #                      Recommended for dense-EM neurons.
  clusterer:
    name: soft_meanshift
    # Common:
    # min_cluster_size: 50
    # backend: auto
    # hdbscan / meanshift:
    # max_points: 50000
    # cluster_selection_epsilon: null   # null → bandwidth
    # spatial_cc:
    # connectivity: 1                   # 1 → 6-nbr; else → 26-nbr
  max_epochs: 100
  accelerator: auto  # Options: cpu, gpu, tpu, auto
  devices: auto
  strategy: ddp  # Explicit DDP for even GPU memory distribution; bf16-mixed is recommended
  precision: bf16-mixed  # Options: 32-true, 16-mixed, bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  val_check_interval: 1.0
  limit_val_batches: 10
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2
  log_every_n_steps: 50
  enable_progress_bar: true
  enable_model_summary: true
  deterministic: false
  benchmark: true
  # torch.compile on the DiT backbone (Cosmos-only; no-op on Vista).
  # false/null = off; true = "reduce-overhead" (~1 min compile);
  # "max-autotune" = best runtime but 5-15 min first compile.
  compile: false
  compile_fullgraph: false
  fast_dev_run: false
  profiler: null  # Options: null, simple, advanced, pytorch
  # Full Lightning resume (optimizer, epoch, schedulers). Prefer this after crashes.
  resume_from_checkpoint: null

# Callbacks configuration
callbacks:
  checkpoint:
    enabled: true
    dirpath: null
    # Scalar tags live under ``{stage}/{mode}/...`` — see
    # ``brainbow/modules/base.py`` for the full hierarchy.
    filename: "{epoch:02d}-{val/automatic/loss:.4f}"
    save_top_k: 3
    monitor: val/automatic/loss
    mode: min
    save_last: true
    verbose: true

  early_stopping:
    enabled: false
    monitor: val/automatic/loss
    patience: 20
    mode: min
    verbose: true
    min_delta: 0.0

  lr_monitor:
    enabled: true

  image_logger:
    enabled: true
    every_n_epochs: 1
    max_images: 4
    # Manifold projection used for the `instance_<algo>` TB panel.
    # algorithm: pca | svd | umap
    #   - pca  (default): linear, centered SVD; fast & deterministic
    #   - svd            : linear, uncentered; slightly cheaper than pca
    #   - umap           : non-linear, highlights local clusters (~10-100× slower)
    # backend:   auto | cuml | torch | umap-learn
    #   - auto (default): cuML on CUDA when available, else torch / umap-learn
    projection_algorithm: pca
    projection_backend: auto
    # Renderer style for the `pred/dir` and `pred/cov` panels.
    # See ``brainbow/callbacks/tensorboard/geometry.py`` module docstring.
    #   - glyph (default): matplotlib quiver arrows for `dir` and ellipse
    #     glyphs for `cov`; the most literal reading of the predictions.
    #     ~50ms / panel (matplotlib).
    #   - flow            : optical-flow-style HSV colour map for both;
    #     pure GPU-tensor ops, ~10× faster, but reads as a colour field
    #     rather than discrete arrows / ellipses.
    # Both styles composite onto the raw EM with the soft predicted sem
    # as the per-pixel blend weight (matches `pred/avg/val`,
    # `pred/emb/_{algo}`, `pred/label/mul`).
    geometry_style: glyph

  # Clear the CUDA allocator cache on *both* sides of validation
  # (before + after).  Helps large 3-D models at the train/val boundary
  # by stopping the val-time peak from staying reserved in the training
  # pool across epochs.
  cuda_empty_cache_before_val: false

  # Log CUDA memory to TensorBoard under ``cuda_memory/*``.  Use to
  # diagnose slow drift toward OOM:
  #   - ``allocated_gb`` flat, ``reserved_gb`` rising → fragmentation
  #     (re-launch with PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True).
  #   - both rising → tensor leak; chase callback / image-logger refs.
  #   - sawtooth tied to val epochs → val peak polluting train pool;
  #     turn on ``cuda_empty_cache_before_val`` above.
  memory_logger:
    enabled: true
    log_every_n_steps: null  # null → inherit ``training.log_every_n_steps``
