# SNEMI3D Configuration
# Trains CosmosTransfer3D on the SNEMI3D neuron EM dataset.
#
# Usage:
#   python scripts/train.py --config-name snemi3d
#   python scripts/train.py --config-name snemi3d data.batch_size=8
#
# Full resume (optimizer + epoch) after interruption:
#   python scripts/train.py --config-name snemi3d \
#     training.resume_from_checkpoint=outputs/checkpoints/last.ckpt

defaults:
  - default

experiment_name: snemi3d
project_name: brainbow
output_dir: outputs

data:
  dataset: snemi3d
  data_root: data/SNEMI3D
  batch_size: 4
  num_workers: 16
  persistent_workers: true
  cache_rate: 0.0
  pin_memory: true
  slice_mode: false
  num_samples: 16000
  patch_size: [80, 256, 256]
  find_boundaries: 1.0
  pixel_size: [30, 6, 6]   # z, y, x in nm — SNEMI3D resolution
  min_foreground: 0.80
  resolution_zoom_prob: 0.00
  resolution_zoom_range: [[30, 30], [6, 6], [6, 6]]
  # elastic_prob: 0.00
  # elastic_sigma_range: [5, 8]
  # elastic_magnitude_range: [50, 150]

  train_volumes:
    # AC4 (SNEMI3D train, 1024×1024×100, 401 instance IDs)
    # Download: python scripts/download_snemi3d.py --source snemi
    # Neurons full annotated cylinder (same 6×6×30 nm resolution)
    # Download: python scripts/download_snemi3d.py --source neurons
    - vol: AC4_inputs
      seg: AC4_labels
      root: data/SNEMI3D
    - vol: neurons_5000x2900x300_x3000_y7200_z950_volume
      seg: neurons_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D
  val_volumes:
    - vol: AC4_inputs
      seg: AC4_labels
      root: data/SNEMI3D
    - vol: neurons_5000x2900x300_x3000_y7200_z950_volume
      seg: neurons_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D
  test_volumes:
    - vol: AC4_inputs
      seg: AC4_labels
      root: data/SNEMI3D
    - vol: neurons_5000x2900x300_x3000_y7200_z950_volume
      seg: neurons_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D

model:
  type: cosmostransfer3d
  in_channels: 1
  num_classes: 16
  instance_channels: 10
  brainbow_channels: 10
  feature_size: 64
  variant: "2B"
  dtype: "bf16"
  pretrained: true              # auto-pull nvidia/Cosmos-Transfer2.5-2B from HF
  freeze_vae_encoder: true
  freeze_dit_backbone: false
  freeze_vae_decoder: false
  gradient_checkpointing: false
  dropout: 0.2

callbacks:
  cuda_empty_cache_before_val: true
  image_logger:
    max_images: 8

training:
  max_epochs: 100
  accelerator: auto
  devices: auto
  strategy: ddp
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  limit_val_batches: 100
  num_sanity_val_steps: 2
  log_every_n_steps: 50
  benchmark: true
  # torch.compile on DiT backbone. false/null disables; true uses
  # "reduce-overhead" (~1 min compile, good runtime); "max-autotune"
  # gives best runtime but 5-15 min first-run compile.
  compile: "max-autotune"
  compile_fullgraph: true
  training_modes:
    - automatic
  # Validation-time clusterer.  `bandwidth` and `normalize_embeddings`
  # default to loss.delta_v / loss.normalize_embeddings.
  #
  # Options (fastest & most neuron-appropriate last):
  #   - soft_meanshift : differentiable, mode-based; over-segments
  #                      random embeddings early in training → pretty
  #                      but misleading panels before ~2 k steps.
  #   - hdbscan        : density-based, auto-K; honest but silent until
  #                      the embedding separates.  Ignores spatial
  #                      connectivity so two disconnected cells with
  #                      similar mean embedding can merge.
  #   - spatial_cc     : connected components on the per-voxel
  #                      embedding-affinity graph (6-connectivity).
  #                      Respects spatial connectivity, runs at full
  #                      resolution, and accepts **per-axis** embedding
  #                      thresholds (a list instead of a scalar) for
  #                      anisotropic EM.  On 5:1 Z:XY stacks like
  #                      SNEMI3D, neurons routinely touch across Z
  #                      slices while being distinct cells; a tighter
  #                      Z entry stops them from merging through one
  #                      borderline-similar Z neighbour — the dominant
  #                      failure mode of isotropic spatial_cc/HDBSCAN
  #                      on this data.
  #
  # Backend picker (`backend: auto`) prefers:
  #   1. self    : our self-contained CuPy RawKernel union-find
  #                (Shiloach-Vishkin hook + pointer-jumping).  No
  #                pylibcugraph / cusparse CSC<->CSR round-trip, so
  #                it is both faster than option 2 and robust to cuML
  #                installs missing pylibcugraph.
  #   2. cupy    : cupyx.scipy.sparse.csgraph.connected_components
  #                (needs pylibcugraph — kept for debugging parity).
  #   3. scipy   : CPU round-trip.
  # Use `backend: self` to force the kernel path (e.g. for DDP
  # reproducibility).
  clusterer:
    name: soft_meanshift #spatial_cc
    min_cluster_size: 50
    connectivity: 1            # 1 → 6-neighbour; else → 26-neighbour
    backend: auto              # auto → self on CUDA, scipy on CPU
    # name: spatial_cc
    # backend: self
    # min_cluster_size: 50
    # connectivity: 1
    # bandwidth: [0.1, 0.5, 0.5]   # [Z, Y, X]; Z tighter to respect anisotropy

optimizer:
  type: adamw
  lr: 2e-5
  dit_backbone_lr: 2e-4
  weight_decay: 1.0e-4
  scheduler:
    type: cosine_warmup
    warmup_epochs: 2
    T_max: 50
    eta_min: 1.0e-6

loss:
  # CombinedLoss = weight_semantic * semantic + weight_instance * instance
  #              + weight_geometry * geometry + weight_brainbow * brainbow
  # Each head has its own sub-weights below.  Setting a head weight to 0
  # disables that head entirely (the sub-module is not instantiated).

  # -----------------------------------------------------------------
  # Semantic head -- binary foreground / background (sigmoid, 1 class)
  # -----------------------------------------------------------------
  semantic_mode: sigmoid           # sigmoid (multi-label) | softmax (exclusive)
  active_classes: 1                # only foreground is learnt for SNEMI3D
  class_weights: [0.2]             # per-class CE weighting (down-weights FG to fight imbalance)
  label_smoothing: 0.0
  weight_semantic: 1.0             # head weight; 0 -> semantic head disabled (instance carries FG info)
  weight_ce: 1.0                   # cross-entropy sub-loss
  weight_iou: 0.0                  # IoU sub-loss (0 -> skipped)
  weight_dice: 1.0                 # Dice sub-loss (helps on heavily imbalanced FG)

  # -----------------------------------------------------------------
  # Instance head -- discriminative embedding (pull / push / norm)
  # -----------------------------------------------------------------
  weight_instance: 1.0             # head weight for the embedding loss
  weight_pull: 1.0                 # intra-cluster pull (voxels -> their centroid, hinge at delta_v)
  weight_push: 1.0                 # inter-cluster push (centroid <-> centroid, hinge at delta_d)
  weight_norm: 0.001               # mild centroid-norm regulariser (prevents blowup)
  delta_v: 0.5                     # pull margin: allowed intra-cluster radius
  delta_d: 1.5                     # push margin: half the minimum centroid separation
  normalize_embeddings: false      # L2-normalise embeddings before loss (cosine-like)
  anchor_to_centroid: false        # anchor pull to running centroid instead of batch centroid
  learned_task_weights: false      # Kendall-style uncertainty weighting across heads
  max_hard_pairs: 0                # 0 = all pairs; >0 = hard-negative mining budget
  weight_edge: 1.0                 # per-voxel multiplier on boundary voxels (1.0 = off)
  weight_bone: 1.0                 # per-voxel multiplier on medial-axis voxels (1.0 = off)

  # -----------------------------------------------------------------
  # Geometry head -- direction field + covariance + raw reconstruction
  # -----------------------------------------------------------------
  weight_geometry: 1.0             # head weight; 0 -> geometry head disabled
  dir_target: centroid             # direction-field target: "centroid" or "skeleton"
  weight_dir: 1.0                  # direction sub-loss
  weight_cov: 1.0                  # covariance sub-loss (shape/anisotropy)
  weight_raw: 1.0                  # raw-image reconstruction sub-loss (autoencoder-ish)
  loss_dir: smooth_l1              # regression loss for direction   (mse | l1 | smooth_l1)
  loss_cov: smooth_l1              # regression loss for covariance
  loss_raw: smooth_l1              # regression loss for raw-intensity reconstruction

  ignore_index: -100               # label value excluded from every loss term

  # -----------------------------------------------------------------
  # Brainbow head -- per-instance (minloc, avgloc, maxloc) RGB
  # colouring + per-voxel raw-intensity reconstruction (10 channels).
  # Channel layout (see brainbow/losses/brainbow.py):
  #   ch 0      := rawval   (raw image intensity, per voxel)
  #   ch 1-3    := minloc   (normalised (z, y, x) of each instance's min)
  #   ch 4-6    := avgloc   (normalised (z, y, x) centroid)
  #   ch 7-9    := maxloc   (normalised (z, y, x) of each instance's max)
  # -----------------------------------------------------------------
  weight_brainbow: 1.0             # head weight; 0 -> brainbow head disabled
  brainbow_loss_loc: smooth_l1     # regression loss for the 9 location channels
  brainbow_loss_raw: l1            # regression loss for the rawval channel
  weight_minloc: 1.0               # sub-weight for minloc channels (ch 1-3)
  weight_avgloc: 1.0               # sub-weight for avgloc channels (ch 4-6)
  weight_maxloc: 1.0               # sub-weight for maxloc channels (ch 7-9)
  weight_rawval: 1.0               # sub-weight for rawval channel  (ch 0)
  brainbow_foreground_only_loc: true  # apply location loss on foreground voxels only (bg has no instance)
