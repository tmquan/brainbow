# =====================================================================
# SNEMI3D + Neurons + MICrONS  --  CosmosPredict3D training config
# =====================================================================
# Inheritance chain:  default <- snemi3d
#
# Trains CosmosPredict3D jointly on three EM datasets at a harmonised
# resolution so a single model sees all three:
#
#   Dataset    Native res (Z, Y, X nm)   Source
#   --------   -----------------------   --------------------------------
#   SNEMI3D    30 x 6 x 6                scripts/download_snemi3d.py
#   neurons    30 x 6 x 6                scripts/download_snemi3d.py
#   MICrONS    40 x 8 x 8                scripts/download_microns.py
#
# `data.resolution_zoom_*` rescales every crop into the joint target
# range Z = 30-40 nm, XY = 6-8 nm so the three sources are interchangeable.
#
# Splits used below:
#   train : AC4 + 2 neurons cylinders + 10 MICrONS minnie65 crops
#   val   : AC4 + 2 neurons cylinders + 2  MICrONS minnie65 crops
#          (the SNEMI3D-family entries overlap with ``train`` -- only
#          the MICrONS crops are held out; see the ``val_volumes``
#          comment block below for the rationale)
#   test  : same as val
#
# Quick start
# -----------
#   python scripts/train.py --config-name snemi3d
#   python scripts/train.py --config-name snemi3d data.batch_size=8
#
# Resuming a crashed run.  ``scripts/train.py`` overwrites
# ``cfg.output_dir`` with the timestamped run directory it just
# created, so the resume path printed at the top of the log is the
# **flat** ``<run_dir>/checkpoints/last.ckpt`` (the run directory line
# in the log is the literal value to use here)::
#
#   python scripts/train.py --config-name snemi3d \
#     training.resume_from_checkpoint=<run_dir>/checkpoints/last.ckpt
#
# Cross-architecture warm start.  When the saved ``last.ckpt`` was
# trained with a different backbone (e.g. the older Cosmos-Transfer
# wrapper, which carried a ``model.controlnet.*`` branch this Predict
# wrapper does not), full Lightning resume cannot be used (key +
# optimiser-state mismatch).  Use the weights-only path with the skip
# list pinned below to:
#
#   * keep ``model.dit.*`` at the freshly-pulled HF base DiT,
#   * restore everything else (heads, projector, decoder shim, loss
#     buffers, ...) from the ckpt where keys overlap.
#
#   python scripts/train.py --config-name snemi3d \
#     +ckpt_path=<run_dir>/checkpoints/last.ckpt
# =====================================================================

defaults:
  - default

experiment_name: snemi3d
project_name: brainbow
output_dir: outputs


# ---------------------------------------------------------------------
# Checkpoint loading policy (weights-only warm start)
# ---------------------------------------------------------------------
# Source-of-truth for ``+ckpt_path=...`` loads on this recipe.  The
# behaviour table is:
#
#   model.dit.*               -> Fresh nvidia/Cosmos-Predict2.5-2B @
#                                ``diffusers/base/post-trained`` (HF,
#                                dropped from ckpt by the skip list
#                                below).
#   model.feature_projector.* -> Restored from ``last.ckpt``.
#   model.decoder_adapter.*   -> Restored from ``last.ckpt`` (head +
#                                decoder shim).
#   anything else (e.g. ``loss.*`` buffers)
#                             -> Restored from ``last.ckpt`` where keys
#                                overlap; fresh init otherwise.
#
# See ``scripts/train.py::_resolve_checkpoint`` for the loader.  Pass
# ``+ckpt_path_skip_prefixes=[]`` on the CLI to override (e.g. when
# you want the ckpt's ``model.dit.*`` to win over the freshly-pulled HF
# weights).
# ---------------------------------------------------------------------
ckpt_path_skip_prefixes:
  - model.dit.


# ---------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------
data:
  dataset: snemi3d
  data_root: data/SNEMI3D

  # ---- Loader & batching ----
  batch_size: 4
  num_workers: 8
  # persistent_workers=true.  The earlier ``/dev/shm`` blow-up that
  # tempted us to disable this was actually a kimimaro pathos leak
  # (``kimimaro-shm-{dbf,cc-labels}-*`` segments orphaned on worker
  # SIGKILL when kimimaro 5.x interpreted ``parallel=0`` as "fork
  # ``cpu_count()`` subprocesses").  The leak is closed at the
  # transform layer by ``parallel=1`` in
  # ``brainbow/transforms/skeleton.py::_skeletonize_all_kimimaro``,
  # which short-circuits kimimaro's parallel code path entirely.  With
  # that fix in place, persistent workers are the cheaper choice:
  # disabling them re-spawns the forkserver pool every epoch and
  # re-pays the kimimaro-import / MONAI-setup cost on every restart.
  persistent_workers: true
  pin_memory: true
  # cache_rate=0: LazyVolDataset bypasses MONAI's CacheDataset path
  # entirely (~0 MB base RAM per rank per the loader log), so the knob is
  # effectively a no-op here -- kept explicit for clarity.
  cache_rate: 0.0
  # prefetch_factor=2 (PyTorch's documented default for
  # ``DataLoader``).  Per-rank steady-state in-flight budget:
  #   in_flight_batches/rank = num_workers * prefetch_factor = 8*2 = 16
  # Each in-flight item carries the 13-channel geometry quartet
  # (skl + dir + cov + rad) at 80x256x256 float32 ~= 314 MB, so the
  # geometry pool tops out near 16 * 314 MB ~= 5 GB/rank -- comfortably
  # under the ~6 GB/rank ceiling we hit when the kimimaro shm leak
  # (now fixed in ``brainbow/transforms/skeleton.py``) was also
  # competing for ``/dev/shm``.  Picking ``2`` over ``1`` keeps one
  # extra batch queued per worker so a momentarily-slow geometry
  # transform doesn't stall the GPU step; drop to ``1`` if you need to
  # claw back a few GB/rank and the loader is no longer the
  # bottleneck.
  prefetch_factor: 2

  # ---- Sampling & patch geometry ----
  slice_mode: false               # false = volumetric crops; true = 2-D slices
  num_samples: 16000              # crops drawn per epoch (across all volumes)
  patch_size: [80, 256, 256]      # (Z, Y, X) voxels
  min_foreground: 0.80            # reject crops with <80% foreground voxels
  find_boundaries: 1.0            # probability of computing instance boundaries

  # ---- Resolution harmonisation ----
  # SNEMI3D / neurons are 30x6x6 nm, MICrONS is 40x8x8 nm.  We zoom each
  # crop into the joint range below so one model can train on all three.
  pixel_size: [30, 6, 6]                              # (Z, Y, X) nm — base / SNEMI3D
  resolution_zoom_prob: 1.0                           # always apply (joint training)
  resolution_zoom_range: [[30, 40], [6, 8], [6, 8]]   # target per-axis nm range
  resolution_map:                                     # volume-prefix -> native nm
    AC:       [30, 6, 6]
    neurons:  [30, 6, 6]
    minnie65: [40, 8, 8]

  # Elastic deformation is disabled here; uncomment to enable.
  # elastic_prob: 0.0
  # elastic_sigma_range: [5, 8]
  # elastic_magnitude_range: [50, 150]

  # -------------------------------------------------------------------
  # Train volumes
  # -------------------------------------------------------------------
  # Each entry pairs a raw `vol` with its instance-`seg` label volume,
  # both stored under `root`.  MICrONS volume names embed the (x, y, z)
  # crop origin -- the comment column is just that origin for at-a-glance
  # scanning.
  # -------------------------------------------------------------------
  train_volumes:
    # --- SNEMI3D (30x6x6 nm) ---
    # AC4: SNEMI3D train block, 1024 x 1024 x 100, 401 instance IDs.
    #   Download: python scripts/download_snemi3d.py --source snemi
    - vol: AC4_inputs
      seg: AC4_labels
      root: data/SNEMI3D

    # neurons: fully-annotated cylinder, same 30x6x6 nm resolution.
    #   Download: python scripts/download_snemi3d.py --source neurons
    - vol: neurons_5000x2900x300_x3000_y7200_z950_volume
      seg: neurons_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D

    - vol: neurite11_5000x2900x300_x3000_y7200_z950_volume
      seg: neurite11_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D

    # --- MICrONS minnie65 (40x8x8 nm, 4096x4096x800 crops) ---
    #   Download: python scripts/download_microns.py --split
    - vol: minnie65_mip0_4096x4096x800_x50000_y60000_z16000_volume          # train01
      seg: minnie65_mip0_4096x4096x800_x50000_y60000_z16000_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x110000_y60000_z18000_volume         # train02
      seg: minnie65_mip0_4096x4096x800_x110000_y60000_z18000_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x80000_y70000_z16500_volume          # train03
      seg: minnie65_mip0_4096x4096x800_x80000_y70000_z16500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x140000_y80000_z17500_volume         # train04
      seg: minnie65_mip0_4096x4096x800_x140000_y80000_z17500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x45000_y75000_z16500_volume          # train05
      seg: minnie65_mip0_4096x4096x800_x45000_y75000_z16500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x95000_y50000_z18500_volume          # train06
      seg: minnie65_mip0_4096x4096x800_x95000_y50000_z18500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x125000_y70000_z16500_volume         # train07
      seg: minnie65_mip0_4096x4096x800_x125000_y70000_z16500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x60000_y50000_z17500_volume          # train08
      seg: minnie65_mip0_4096x4096x800_x60000_y50000_z17500_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x130000_y50000_z17000_volume         # train09
      seg: minnie65_mip0_4096x4096x800_x130000_y50000_z17000_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x90000_y85000_z18500_volume          # train10
      seg: minnie65_mip0_4096x4096x800_x90000_y85000_z18500_v1300_segmentation
      root: data/MICRONS

  # -------------------------------------------------------------------
  # Val / test volumes
  # -------------------------------------------------------------------
  # ``val_volumes`` and ``test_volumes`` are the same list (anchored
  # via ``&eval_volumes`` / ``*eval_volumes`` below).  Only the two
  # MICrONS minnie65 crops are held out from training; the three
  # SNEMI3D-family entries (AC4 + the two neurons / neurite11
  # cylinders) are deliberately shared with ``train_volumes`` so the
  # val-time clusterer / image-logger panels stay anchored to the same
  # cropped neighbourhoods we see in training (cheap eyeball check
  # against memorisation -- a healthy run still produces qualitatively
  # different predictions per crop because each val draw is a fresh
  # ``RandSpatialCropd`` sample).
  # -------------------------------------------------------------------
  val_volumes: &eval_volumes
    - vol: AC4_inputs
      seg: AC4_labels
      root: data/SNEMI3D
    - vol: neurons_5000x2900x300_x3000_y7200_z950_volume
      seg: neurons_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D
    - vol: neurite11_5000x2900x300_x3000_y7200_z950_volume
      seg: neurite11_5000x2900x300_x3000_y7200_z950_segmentation
      root: data/SNEMI3D
    - vol: minnie65_mip0_4096x4096x800_x70000_y90000_z17000_volume          # test01
      seg: minnie65_mip0_4096x4096x800_x70000_y90000_z17000_v1300_segmentation
      root: data/MICRONS
    - vol: minnie65_mip0_4096x4096x800_x105000_y80000_z16500_volume         # test02
      seg: minnie65_mip0_4096x4096x800_x105000_y80000_z16500_v1300_segmentation
      root: data/MICRONS

  test_volumes: *eval_volumes


# ---------------------------------------------------------------------
# Model -- CosmosPredict3D (Cosmos-Predict2.5-2B base DiT, no ControlNet)
# ---------------------------------------------------------------------
# Cosmos-Predict2.5 is the upstream base DiT in NVIDIA's Cosmos 2.5
# stack -- a plain DiT + Wan-VAE pair, with no ControlNet residual
# branch (that's the Cosmos-Transfer 2.5 add-on; see the sister
# package ``brainbow/models/cosmos_transfer_2_5/`` if you want it).
# Loaded from ``nvidia/Cosmos-Predict2.5-2B`` @
# ``diffusers/base/post-trained`` (the closest analog to the
# ``diffusers/general`` revision Cosmos-Transfer 2.5 uses, so warm-
# starting between the two backbones still works):
#
#   self.dit  -- ``CosmosTransformer3DModel`` (~2 B params), the only
#                transformer branch.  Whether it trains depends on
#                ``freeze_dit_backbone`` below.
#
# The same EM VAE latent feeds the DiT alone (no auxiliary control
# signal).  See ``brainbow/models/cosmos_predict_2_5/`` for the wrapper
# and ``brainbow/models/cosmos_2_5_common/`` for the scaffolding shared
# with Cosmos-Transfer 2.5.
# ---------------------------------------------------------------------
model:
  type: cosmospredict3d
  variant: "2B"
  dtype: "bf16"
  pretrained: true                # auto-pulls nvidia/Cosmos-Predict2.5-2B from HF

  # Unified output head (must match brainbow.losses._common.HEAD_CHANNELS):
  in_channels: 1                  # raw EM input -> 1 channel
  # raw(1)+sem(1)+skl(1)+dir(3)+cov(6)+rad(1)+avg(3)+emb(16)
  head_channels: 32
  feature_size: 64

  # What to freeze.  Cosmos-Predict has no ControlNet residual branch
  # to absorb the trainable load, so leaving the DiT permanently
  # frozen would mean only the heads + last VAE-decoder up-block
  # train.  ``freeze_dit_backbone`` is applied **once at construction**
  # (see ``brainbow/models/cosmos_2_5_common/wrapper_base.py``):
  #
  #   true  -> base DiT permanently frozen (heads-only training; only
  #            ~10M params receive gradients).
  #   false -> base DiT permanently trainable; the DiT param group
  #            picks up ``optimizer.dit_backbone_lr`` (10x lower than
  #            the head ``optimizer.lr``).
  #
  # Note: the historical integer-N "freeze for epochs 0..N-1, then
  # unfreeze" interpretation was removed in the Phase 1 cleanup
  # (see ``doc/GOTCHAS.md`` items #5 and #27); the per-epoch thaw
  # branch in ``on_train_epoch_start`` no longer exists.  Non-zero
  # integers are now silently truthy (treated as ``true``).  See
  # ``doc/ARCHITECT.md`` for the parameter-budget table.
  freeze_vae_encoder: true
  # Current value: end-to-end training of the base DiT from step 0.
  #
  # Consider flipping to ``true`` (heads-only warm-up) if the very
  # first multi-GPU all-reduce trips an Xid 145 NVLink-SHARP fault on
  # this node -- the failure mode that motivated the NCCL env block
  # at the top of ``scripts/train.py`` (``NCCL_NVLS_ENABLE=0`` +
  # ``NCCL_ALGO=Ring`` + ``NCCL_PROTO=Simple``).  Freezing the DiT
  # shrinks the cold first all-reduce from ~2B params to the head
  # group (~10M params), giving the fabric a small warm-up
  # collective before the big reductions start; once you have a few
  # clean DDP runs you can flip back to ``false`` for an end-to-end
  # fine-tune.
  freeze_dit_backbone: 1
  freeze_vae_decoder: true

  gradient_checkpointing: false
  dropout: 0.0


# ---------------------------------------------------------------------
# Callbacks (overrides on top of default.yaml)
# ---------------------------------------------------------------------
callbacks:
  cuda_empty_cache_before_val: true   # avoids val-peak polluting train pool
  image_logger:
    max_images: 8


# ---------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------
training:
  max_epochs: 101
  accelerator: auto
  devices: auto
  strategy: ddp
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  limit_val_batches: 100
  num_sanity_val_steps: 2
  log_every_n_steps: 100
  check_val_every_n_epoch: 20     # validate every 20 epochs (default 1)
  benchmark: true

  # torch.compile on the DiT backbone:
  #   false / null     -> off
  #   true             -> "reduce-overhead"  (~1 min compile, good runtime)
  #   "max-autotune"   -> best runtime, but 5-15 min first-run compile
  compile: true
  # compile_fullgraph=true forces a single monolithic Inductor compile
  # of the 2B DiT (no graph breaks), which gives the best steady-state
  # runtime but pays for it with a multi-minute first-step stall.
  # Under DDP that stall is synchronous across ranks, and combined
  # with the cold-train-loader first batch (kimimaro + per-instance
  # EDT, see ``brainbow/transforms/skeleton.py``) it can overshoot
  # ``TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC`` -- which is why we already
  # bump that env var to 1800s in ``scripts/train.py``.  Flip to
  # ``false`` (the safer default) if the watchdog still fires before
  # the first step lands: ``false`` lets Inductor compile
  # incrementally with graph breaks, trading ~10% runtime for a much
  # shorter first-step.
  compile_fullgraph: true

  # -------------------------------------------------------------------
  # Validation-time clusterer
  # -------------------------------------------------------------------
  # Turns the per-voxel embedding into discrete instance IDs at val time.
  # `bandwidth` and `normalize_embeddings` default to loss.delta_v and
  # loss.normalize_embeddings respectively.
  #
  # Choices (in rough order from "pretty early, misleading later" to
  # "honest, neuron-appropriate"):
  #
  #   spatial_cc     -- [current default] connected components on the
  #                     per-voxel embedding-affinity graph
  #                     (face-connectivity by default).  Respects
  #                     spatial connectivity, runs at full resolution,
  #                     and accepts per-axis ``bandwidth`` thresholds
  #                     (a list instead of a scalar) for anisotropic
  #                     EM.  On 5:1 Z:XY stacks like SNEMI3D, neurons
  #                     routinely touch across Z while being distinct
  #                     cells; a tighter Z entry in ``bandwidth``
  #                     stops them merging through one borderline-
  #                     similar Z neighbour -- the dominant failure
  #                     mode of isotropic spatial_cc / HDBSCAN here.
  #                     See ``brainbow/inference/clusterer.py``'s
  #                     :class:`SpatialCCClusterer`.
  #
  #   hdbscan        -- density-based, auto-K.  Honest but silent
  #                     until the embedding actually separates.
  #                     Ignores spatial connectivity, so two
  #                     disconnected cells with similar mean
  #                     embedding can merge.
  #
  #   soft_meanshift -- differentiable, mode-based; was the previous
  #                     default before ``spatial_cc`` landed.
  #                     Over-segments random embeddings, so panels
  #                     look pretty but misleading before ~2k steps.
  #                     Still the only option usable inside the
  #                     training loop (gradient-preserving).
  #
  # ``spatial_cc`` knob semantics (see
  # ``brainbow/inference/clusterer.py::SpatialCCClusterer``):
  #   bandwidth         -- scalar or per-axis list; embedding-distance
  #                        threshold for linking spatial neighbours.
  #                        When omitted, defaults to ``loss.delta_v``.
  #   min_cluster_size  -- clusters smaller than this are mapped back
  #                        to background (applied at full resolution).
  #   connectivity      -- ``1`` -> face (6-nbr in 3D, 4-nbr in 2D);
  #                        any other value -> full (26 / 8).
  #
  # ``backend`` picker for the connected-components pass
  # (``backend: auto`` is the default and prefers, in order):
  #   1. self  -- our self-contained CuPy RawKernel union-find
  #               (Shiloach-Vishkin hook + pointer-jumping).  No
  #               ``pylibcugraph`` dependency; fastest path and the
  #               option taken on CUDA when ``auto`` is selected.
  #   2. cupy  -- ``cupyx.scipy.sparse.csgraph.connected_components``
  #               (needs ``pylibcugraph``; kept for debugging parity).
  #   3. scipy -- CPU ``scipy.sparse.csgraph`` round-trip; the
  #               ``auto`` choice when CUDA is unavailable.
  # Pin to ``backend: self`` (as below) to keep the kernel path
  # deterministic across cuML installs of varying completeness.
  # -------------------------------------------------------------------
  clusterer:
    # Previous default (kept for reference; uncomment to roll back):
    # name: soft_meanshift
    # min_cluster_size: 50
    # connectivity: 1               # 1 -> 6-neighbour, else 26-neighbour
    # backend: auto                 # auto -> self on CUDA, scipy on CPU
    name: spatial_cc
    backend: self
    min_cluster_size: 50
    connectivity: 1
    bandwidth: [0.08, 0.40, 0.40]  # [Z, Y, X]; tighter Z respects 5:1 anisotropy


# ---------------------------------------------------------------------
# Optimizer (algorithm hard-coded to AdamW; see modules/cosmos_2_5_common/base.py)
# ---------------------------------------------------------------------
optimizer:
  lr: 2e-4                        # head / new-parameter LR
  dit_backbone_lr: 2e-5           # 10x lower for the pretrained DiT backbone
  # ``controlnet_lr`` is harmless on Cosmos-Predict (no ControlNet
  # branch -> the param group is empty -> the value is ignored), but
  # left here so flipping ``model.type`` to cosmostransfer3d doesn't
  # also need an optimizer-section edit.
  controlnet_lr: 2e-5
                                  # (defaults to ``dit_backbone_lr`` if unset)
  weight_decay: 1.0e-4
  # Cosine schedule is built in
  # ``brainbow/modules/base.py::_maybe_wrap_scheduler``: a 2-epoch
  # LinearLR warm-up (``start_factor=0.01``), then a CosineAnnealingLR
  # over ``max(T_max - warmup_epochs, 1) = 48`` epochs, stepped per
  # epoch.  Note ``T_max: 50`` is shorter than ``training.max_epochs:
  # 101`` -- the LR reaches ``eta_min`` around epoch 50 and stays
  # pinned there for the remaining ~50 epochs (long low-LR refinement
  # tail).  If you want the cosine to extend across the whole run,
  # set ``T_max`` to ``training.max_epochs``.
  scheduler:
    type: cosine_warmup
    warmup_epochs: 2
    T_max: 50
    eta_min: 1.0e-6


# ---------------------------------------------------------------------
# Loss
# ---------------------------------------------------------------------
# CombinedLoss = one 32-channel head scored by per-field losses.
#
# Unified channel layout:
#   raw: ch  0       -> L1 raw reconstruction
#   sem: ch  1       -> sigmoid BCE + Dice foreground
#   skl: ch  2       -> sigmoid BCE + Dice binary skeleton
#   dir: ch  3- 5    -> L1 skeleton direction
#   cov: ch  6-11    -> L1 upper-triangle Voronoi-cell covariance
#   rad: ch 12       -> L1 distance to nearest skeleton voxel
#   avg: ch 13-15    -> L1 normalised centroid + derived 12-aff
#   emb: ch 16-31    -> discriminative embedding + derived 12-aff
#
# Each weight_<field> mapping has:
#   - weight: scalar multiplier (0 disables that field/path)
#   - all other keys: sub-loss knobs for that field.
# ---------------------------------------------------------------------
loss:
  ignore_index: -100
  background: -1

  weight_raw:
    weight: 2.0
    loss: l1
  weight_sem:
    weight: 2.0
    class_weights: [0.1]
    weight_ce: 1.0
    weight_dice: 1.0
  # Skeleton head supervision.  Dice carries the signal; CE is kept
  # small because the 1-voxel-wide target is ~99.9% negative.
  weight_skl:
    weight: 1.0
    weight_ce: 0.1
    weight_dice: 1.0
  weight_dir:
    weight: 1.0
    loss: l1
  weight_cov:
    weight: 1.0
    loss: l1
  # Distance-to-skeleton scalar.  The default ``data.radius_normalize: true``
  # path gives a per-instance [0, 1] target, so the L1 loss is on the
  # same scale as ``avg``.
  weight_rad:
    weight: 1.0
    loss: l1
  weight_avg:
    weight: 1.0
    loss: l1
  weight_emb:
    weight: 1.0
    weight_pull: 1.0
    weight_push: 1.0
    weight_norm: 0.001
    delta_v: 0.5
    delta_d: 1.5
    normalize_embeddings: false
    max_hard_pairs: 4096
  weight_aff_emb:
    weight: 2.0
    weight_ce: 0.0
    weight_dice: 1.0
    tau: 1.0
  weight_aff_avg:
    weight: 2.0
    weight_ce: 0.0
    weight_dice: 1.0
    tau: 1.0
